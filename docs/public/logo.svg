<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <circle cx="64" cy="64" r="36" fill="#8B5CF6" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Left brace { -->
  <path d="M42 32 Q32 32 32 42 L32 54 Q32 64 22 64 Q32 64 32 74 L32 86 Q32 96 42 96"
    stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Right brace } -->
  <path d="M86 32 Q96 32 96 42 L96 54 Q96 64 106 64 Q96 64 96 74 L96 86 Q96 96 86 96"
    stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Lightning bolt in center -->
  <path d="M68 42 L56 66 L64 66 L60 86 L72 62 L64 62 Z"
    fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Decorative dots -->
  <circle cx="48" cy="20" r="3" fill="#6366F1" opacity="0.6"/>
  <circle cx="80" cy="108" r="3" fill="#A78BFA" opacity="0.6"/>
  <circle cx="108" cy="40" r="2.5" fill="#FBBF24" opacity="0.5"/>
  <circle cx="20" cy="88" r="2.5" fill="#FBBF24" opacity="0.5"/>
</svg>
