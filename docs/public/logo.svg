<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1222"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="20" y1="30" x2="108" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D8F0"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="56" y1="52" x2="72" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7EECFB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="knobGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </radialGradient>
    <radialGradient id="shimmer" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="toggleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>
  <rect width="128" height="128" rx="28" fill="url(#shimmer)"/>

  <ellipse cx="64" cy="66" rx="30" ry="28" fill="#06B6D4" opacity="0.08" filter="url(#ambientGlow)"/>

  <!-- Left brace -->
  <path d="M48 30 C40 30 38 36 38 42 L38 56 C38 60 34 64 28 64 C34 64 38 68 38 72 L38 86 C38 92 40 98 48 98"
    stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Right brace -->
  <path d="M80 30 C88 30 90 36 90 42 L90 56 C90 60 94 64 100 64 C94 64 90 68 90 72 L90 86 C90 92 88 98 80 98"
    stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Toggle track -->
  <rect x="50" y="52" width="28" height="24" rx="12" fill="#0E2A3D" stroke="url(#accentGrad)" stroke-width="2.5"/>
  <rect x="52" y="54" width="24" height="20" rx="10" fill="#0C3547" opacity="0.6"/>
  <rect x="60" y="54" width="16" height="20" rx="10" fill="#06B6D4" opacity="0.15"/>

  <!-- Toggle knob -->
  <circle cx="70" cy="64" r="7.5" fill="url(#knobGrad)" filter="url(#toggleGlow)"/>
  <circle cx="69" cy="62" r="3" fill="white" opacity="0.3"/>
  <circle cx="56" cy="64" r="1.5" fill="#22D3EE" opacity="0.4"/>
</svg>
