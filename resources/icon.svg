<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#141E30"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="28" y1="28" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="64" y1="30" x2="64" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Ambient glow behind the icon -->
  <circle cx="64" cy="64" r="32" fill="#06B6D4" opacity="0.07" filter="url(#bigGlow)"/>

  <!-- Left curly brace { -->
  <path d="M46 34 Q36 34 36 44 L36 56 Q36 64 28 64 Q36 64 36 72 L36 84 Q36 94 46 94"
    stroke="url(#brandGrad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Right curly brace } -->
  <path d="M82 34 Q92 34 92 44 L92 56 Q92 64 100 64 Q92 64 92 72 L92 84 Q92 94 82 94"
    stroke="url(#brandGrad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Center toggle/switch - represents "mocking on" -->
  <rect x="52" y="54" width="24" height="20" rx="10" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
  <circle cx="70" cy="64" r="6" fill="url(#accentGrad)" filter="url(#glow)"/>
</svg>
