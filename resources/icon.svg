<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Background gradient - deep rich dark -->
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1222"/>
    </linearGradient>

    <!-- Primary brand gradient - vibrant cyan to teal -->
    <linearGradient id="brandPrimary" x1="20" y1="30" x2="108" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D8F0"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>

    <!-- Accent gradient for toggle - bright cyan -->
    <linearGradient id="accentBright" x1="56" y1="52" x2="72" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7EECFB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Inner glow for toggle knob -->
    <radialGradient id="knobGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </radialGradient>

    <!-- Subtle shimmer on background -->
    <radialGradient id="bgShimmer" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for the toggle -->
    <filter id="toggleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient background glow -->
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Soft shadow for depth -->
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Background shimmer overlay -->
  <rect width="128" height="128" rx="28" fill="url(#bgShimmer)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.03" stroke="#67E8F9" stroke-width="0.5">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>

  <!-- Ambient glow behind main icon -->
  <ellipse cx="64" cy="66" rx="30" ry="28" fill="#06B6D4" opacity="0.08" filter="url(#ambientGlow)"/>

  <!-- Small decorative dots - representing data/API endpoints -->
  <circle cx="24" cy="38" r="1.5" fill="#22D3EE" opacity="0.2"/>
  <circle cx="104" cy="42" r="1" fill="#22D3EE" opacity="0.15"/>
  <circle cx="20" cy="90" r="1" fill="#22D3EE" opacity="0.12"/>
  <circle cx="108" cy="86" r="1.5" fill="#22D3EE" opacity="0.18"/>

  <!-- Left curly brace { - refined with better curves -->
  <path d="M48 30 C40 30 38 36 38 42 L38 56 C38 60 34 64 28 64 C34 64 38 68 38 72 L38 86 C38 92 40 98 48 98"
    stroke="url(#brandPrimary)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Right curly brace } - refined with better curves -->
  <path d="M80 30 C88 30 90 36 90 42 L90 56 C90 60 94 64 100 64 C94 64 90 68 90 72 L90 86 C90 92 88 98 80 98"
    stroke="url(#brandPrimary)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Toggle switch track -->
  <rect x="50" y="52" width="28" height="24" rx="12" fill="#0E2A3D" stroke="url(#accentBright)" stroke-width="2.5" filter="url(#softShadow)"/>

  <!-- Toggle track inner highlight -->
  <rect x="52" y="54" width="24" height="20" rx="10" fill="#0C3547" opacity="0.6"/>

  <!-- Active indicator glow on right side of track -->
  <rect x="60" y="54" width="16" height="20" rx="10" fill="#06B6D4" opacity="0.15"/>

  <!-- Toggle knob - positioned to the "on" side -->
  <circle cx="70" cy="64" r="7.5" fill="url(#knobGlow)" filter="url(#toggleGlow)"/>

  <!-- Knob inner shine -->
  <circle cx="69" cy="62" r="3" fill="white" opacity="0.3"/>

  <!-- Small "on" indicator dot -->
  <circle cx="56" cy="64" r="1.5" fill="#22D3EE" opacity="0.4"/>
</svg>
